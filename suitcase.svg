<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- handle -->
  <rect x="88" y="18" width="64" height="34" rx="14" fill="none" stroke="#111" stroke-width="10"/>
  <rect x="88" y="18" width="64" height="34" rx="14" fill="none" stroke="#FFD400" stroke-width="5"/>
  <!-- body -->
  <rect x="20" y="45" width="200" height="135" rx="18" fill="#FFD400" stroke="#111" stroke-width="6"/>
  <!-- straps -->
  <rect x="55" y="45" width="14" height="135" fill="#FF7A00"/>
  <rect x="171" y="45" width="14" height="135" fill="#FF7A00"/>
  <!-- latches -->
  <rect x="52" y="38" width="20" height="16" rx="3" fill="#111"/>
  <rect x="168" y="38" width="20" height="16" rx="3" fill="#111"/>
  <!-- crossed-out Z in orange circle -->
  <text x="120" y="133" font-size="52" font-weight="900" text-anchor="middle" fill="#111" font-family="Arial, sans-serif">Z</text>
  <g stroke="#FF7A00" stroke-width="9" fill="none" stroke-linecap="round">
    <circle cx="120" cy="114" r="42"/>
    <line x1="91" y1="85" x2="149" y2="143"/>
  </g>
  <!-- polka dots -->
  <circle cx="40" cy="65" r="5" fill="#111" opacity=".85"/>
  <circle cx="205" cy="160" r="5" fill="#111" opacity=".85"/>
  <circle cx="42" cy="160" r="5" fill="#111" opacity=".85"/>
  <circle cx="200" cy="65" r="5" fill="#111" opacity=".85"/>
</svg>
